name: Build and Deploy to Azure Container App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_NAME }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: ${{ secrets.AZURE_REGISTRY_NAME }}/techworkshop:${{ github.sha }}
      
      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          registryUrl: ${{ secrets.AZURE_REGISTRY_NAME }}
          registryUsername: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ secrets.AZURE_REGISTRY_NAME }}/techworkshop:${{ github.sha }}
          environmentVariables: |
            FOUNDRY_ENDPOINT=${{ secrets.FOUNDRY_ENDPOINT }}
            gpt_endpoint=${{ secrets.gpt_endpoint }}
            embedding_endpoint=${{ secrets.embedding_endpoint }}
            phi_4_endpoint=${{ secrets.phi_4_endpoint }}